<!DOCTYPE html>

<head>

<body>

<canvas id="network-canvas" aria-hidden="true"></canvas>

<noscript>
    <div style="max-width:640px;margin:60px auto;padding:24px;border:1px solid #00d2ff;color:#e2e8f0;font-family:monospace;text-align:center;">
        <p>This portfolio needs JavaScript enabled to display its content.</p>
        <p style="margin-top:12px;">
            <a href="mailto:rohitlalu@yahoo.com" style="color:#00d2ff;">Email</a> ·
            <a href="https://linkedin.com/in/rohitlalu" style="color:#00d2ff;">LinkedIn</a> ·
            <a href="https://github.com/RohitLalu" style="color:#00d2ff;">GitHub</a>
        </p>
    </div>
</noscript>

<header class="hero">
    <h1>ROHIT-L-SOC v1.0</h1>
    <p class="subtitle">
        Electronics & Communication Engineering • Semiconductor Design • Computer Architecture
    </p>

    <div class="hero-links">
        <a href="mailto:rohitlalu@yahoo.com">EMAIL</a>
        <a href="https://linkedin.com/in/rohitlalu" target="_blank">LINKEDIN</a>
        <a href="https://github.com/RohitLalu" target="_blank">GITHUB</a>
    </div>
</header>

<main class="pad-ring">

    <div class="chip-label">ROHIT-L-SOC DIE SHOT</div>

    <section class="chip-die">

        <svg class="die-routing" viewBox="0 0 800 650" preserveAspectRatio="none" aria-hidden="true">

            <path id="trace-experience"   class="trace" d="M150,230 V325 H365" />
            <path id="trace-education"    class="trace" d="M650,230 V290 H400" />
            <path id="trace-projects"     class="trace" d="M150,420 V360 H400" />
            <path id="trace-competitions" class="trace" d="M650,420 V325 H435" />

            <g id="bustag-experience" class="bus-tag">
                <line x1="232" y1="318" x2="244" y2="332" />
                <text x="248" y="316">/32</text>
            </g>
            <g id="bustag-education" class="bus-tag">
                <line x1="512" y1="283" x2="524" y2="297" />
                <text x="486" y="280">/64</text>
            </g>
            <g id="bustag-projects" class="bus-tag">
                <line x1="272" y1="353" x2="284" y2="367" />
                <text x="288" y="378">/8</text>
            </g>
            <g id="bustag-competitions" class="bus-tag">
                <line x1="537" y1="318" x2="549" y2="332" />
                <text x="500" y="316">/16</text>
            </g>

        </svg>

        <div class="noc-block">
            <h3>NoC</h3>
            <span>Routing Fabric</span>
        </div>

        <button type="button" class="die-block cpu-core" data-section="experience" onclick="openCategory('experience', this)">
            <span class="coord-tag">(0,0)</span>
            <span class="die-tag">U1 // CPU CORE</span>
            <svg class="die-icon" viewBox="0 0 64 64" aria-hidden="true">
                <rect x="16" y="16" width="32" height="32" rx="2" />
                <line x1="8" y1="22" x2="16" y2="22" />
                <line x1="8" y1="32" x2="16" y2="32" />
                <line x1="8" y1="42" x2="16" y2="42" />
                <line x1="48" y1="22" x2="56" y2="22" />
                <line x1="48" y1="32" x2="56" y2="32" />
                <line x1="48" y1="42" x2="56" y2="42" />
                <line x1="22" y1="8" x2="22" y2="16" />
                <line x1="32" y1="8" x2="32" y2="16" />
                <line x1="42" y1="8" x2="42" y2="16" />
                <line x1="22" y1="48" x2="22" y2="56" />
                <line x1="32" y1="48" x2="32" y2="56" />
                <line x1="42" y1="48" x2="42" y2="56" />
                <circle cx="22" cy="22" r="1.6" fill="currentColor" stroke="none" />
            </svg>
            <h2>Experience</h2>
            <span class="block-meta">Experience Engine</span>
            <p>IIT Delhi • ACM NITK</p>
        </button>

        <button type="button" class="die-block memory-subsystem" data-section="education" onclick="openCategory('education', this)">
            <span class="coord-tag">(1,0)</span>
            <span class="die-tag">U2 // MEMORY</span>
            <svg class="die-icon" viewBox="0 0 64 64" aria-hidden="true">
                <rect x="10" y="10" width="44" height="44" rx="2" />
                <line x1="10" y1="21.5" x2="54" y2="21.5" />
                <line x1="10" y1="32" x2="54" y2="32" />
                <line x1="10" y1="42.5" x2="54" y2="42.5" />
                <line x1="21.5" y1="10" x2="21.5" y2="54" />
                <line x1="32" y1="10" x2="32" y2="54" />
                <line x1="42.5" y1="10" x2="42.5" y2="54" />
            </svg>
            <h2>Education</h2>
            <span class="block-meta">Knowledge Store</span>
            <p>NITK • Coursework • Skills</p>
        </button>

        <button type="button" class="die-block project-cluster" data-section="projects" onclick="openCategory('projects', this)">
            <span class="coord-tag">(0,1)</span>
            <span class="die-tag">U3 // VLSI CLUSTER</span>
            <svg class="die-icon" viewBox="0 0 64 64" aria-hidden="true">
                <path d="M14 18 H32 a14 14 0 0 1 0 28 H14 Z" />
                <line x1="6" y1="24" x2="14" y2="24" />
                <line x1="6" y1="40" x2="14" y2="40" />
                <line x1="46" y1="32" x2="56" y2="32" />
                <circle cx="56" cy="32" r="2" fill="currentColor" stroke="none" />
            </svg>
            <h2>Projects</h2>
            <span class="block-meta">Projects</span>
            <p>RTL→GDSII • FIR • DAC • CPU</p>
        </button>

        <button type="button" class="die-block accelerator-cluster" data-section="competitions" onclick="openCategory('competitions', this)">
            <span class="coord-tag">(1,1)</span>
            <span class="die-tag">U4 // ACCELERATORS</span>
            <svg class="die-icon" viewBox="0 0 64 64" aria-hidden="true">
                <rect x="8" y="8" width="14" height="14" rx="1.5" />
                <rect x="25" y="8" width="14" height="14" rx="1.5" />
                <rect x="42" y="8" width="14" height="14" rx="1.5" />
                <rect x="8" y="25" width="14" height="14" rx="1.5" />
                <rect x="25" y="25" width="14" height="14" rx="1.5" />
                <rect x="42" y="25" width="14" height="14" rx="1.5" />
                <line x1="22" y1="15" x2="25" y2="15" />
                <line x1="39" y1="15" x2="42" y2="15" />
                <line x1="22" y1="32" x2="25" y2="32" />
                <line x1="39" y1="32" x2="42" y2="32" />
                <line x1="15" y1="22" x2="15" y2="25" />
                <line x1="32" y1="22" x2="32" y2="25" />
                <line x1="49" y1="22" x2="49" y2="25" />
            </svg>
            <h2>Competitions</h2>
            <span class="block-meta">Competitions</span>
            <p>Robocon • Samsung Chip Design Studio</p>

    </section>
</main>

<!-- ==================================================
     POPUP MODAL SHELL
     One reusable container for every category. JS fills
     #modal-body with either the item-list view or a
     single item's detail view, driven by portfolioData
     in script.js.
================================================== -->

<div class="modal-backdrop" id="modal-backdrop">
    <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="modal-title" id="modal-panel">

        <div class="modal-header">
            <div class="modal-header-text">
                <h2 id="modal-title">SOC_DEBUG</h2>
                <span id="modal-subtitle"></span>
            </div>
            <button type="button" class="modal-close" id="modal-close" aria-label="Close">✕</button>
        </div>

        <div class="modal-body" id="modal-body"></div>

    </div>
</div>

<script src="script.js"></script>
</body>
</html>
